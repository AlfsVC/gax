<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Un mensaje especial para ti 💝">
<meta name="theme-color" content="#ff3cac">
<title>✨ 💝 Para Ti 💝 ✨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💝</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Raleway:wght@300;400;600&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Raleway',sans-serif; -webkit-tap-highlight-color:transparent; }

.stars-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(1.5px 1.5px at 5% 15%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 40%, rgba(255,200,220,0.8) 0%, transparent 100%),
    radial-gradient(2px 2px at 25% 70%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 25%, rgba(200,150,255,0.9) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 45% 85%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 10%, rgba(255,220,100,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 55%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(2px 2px at 75% 30%, rgba(180,220,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 92% 45%, rgba(255,180,220,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 50%, rgba(200,200,255,0.5) 0%, transparent 100%);
  animation: twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle { 0%{opacity:0.8} 100%{opacity:1} }

/* ======== SCREEN 1 ======== */
#screen1 {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:10;
  background: radial-gradient(ellipse at center, #200015 0%, #08000f 60%, #000 100%);
  transition: opacity 0.6s;
}
.pregunta {
  font-family:'Playfair Display',serif;
  font-size: clamp(2.2rem, 9vw, 5rem);
  font-weight:900; color:#fff;
  text-shadow: 0 0 40px rgba(255,60,150,0.9), 0 0 100px rgba(255,60,150,0.4);
  letter-spacing:0.05em; text-align:center;
  animation: glow 2.5s ease-in-out infinite;
  margin-bottom:0.6rem;
}
.corazon-deco {
  font-size:clamp(2.5rem,7vw,4rem);
  animation: latido 1.1s ease-in-out infinite;
  display:block; margin-bottom:1.5rem; text-align:center;
}
.subtitulo {
  color:rgba(255,170,210,0.65); font-size:0.9rem;
  letter-spacing:0.35em; text-align:center; margin-bottom:2.8rem;
}
.btns-row {
  display:flex; gap:1.5rem; justify-content:center; align-items:center;
}
.btn-si {
  padding:1rem 3rem; font-size:1.25rem; font-family:'Raleway',sans-serif; font-weight:700;
  background:linear-gradient(135deg,#ff3cac,#c1007e);
  color:#fff; border:none; border-radius:50px; cursor:pointer;
  box-shadow:0 0 30px rgba(255,60,172,0.7); letter-spacing:0.1em;
  transition:transform 0.2s,box-shadow 0.2s;
}
.btn-si:hover { transform:scale(1.08); box-shadow:0 0 55px rgba(255,60,172,1); }
.btn-no {
  padding:0.9rem 2.2rem; font-size:1.1rem; font-family:'Raleway',sans-serif; font-weight:400;
  background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.75);
  border:1.5px solid rgba(255,255,255,0.25); border-radius:50px; cursor:pointer;
  letter-spacing:0.05em; transition:background 0.2s,transform 0.15s;
  user-select:none;
}
.btn-no:hover { background:rgba(255,255,255,0.13); }

@keyframes glow { 0%,100%{text-shadow:0 0 40px rgba(255,60,150,0.9)} 50%{text-shadow:0 0 80px rgba(255,60,150,1),0 0 140px rgba(255,60,150,0.5)} }
@keyframes latido { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

/* ======== SCREEN 2 ======== */
#screen2 {
  position:fixed; inset:0; display:none; flex-direction:column;
  align-items:center; justify-content:center; z-index:10;
  background:radial-gradient(ellipse at center,#0a001a 0%,#000 70%);
}
.sabia-emoji { font-size:3.5rem; display:block; text-align:center;
  animation:fadeInUp 0.8s ease forwards; }
.sabia-texto {
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5.5vw,3.2rem); color:#fff;
  text-shadow:0 0 40px rgba(160,100,255,0.9); margin:1.2rem 0 2.8rem;
  text-align:center; line-height:1.4;
  opacity:0; animation:fadeInUp 0.9s ease forwards 0.3s;
}
.btn-regalo {
  padding:1.2rem 3.5rem; font-size:1.3rem; font-family:'Raleway',sans-serif; font-weight:700;
  background:linear-gradient(135deg,#784ba0,#2b86c5,#ff3cac);
  background-size:200%; color:#fff; border:none; border-radius:50px; cursor:pointer;
  box-shadow:0 0 40px rgba(120,75,160,0.7); letter-spacing:0.1em;
  animation:gradShift 3s linear infinite, fadeInUp 1s ease forwards 0.7s;
  opacity:0; transition:transform 0.2s;
}
.btn-regalo:hover { transform:scale(1.06); }
@keyframes fadeInUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
@keyframes gradShift { 0%{background-position:0%} 100%{background-position:200%} }

/* ======== SCREEN 3 ======== */
#screen3 { position:fixed; inset:0; display:none; z-index:10; }
#universe-canvas { display:block; width:100%; height:100%; cursor:grab; touch-action:none; }
#universe-canvas:active { cursor:grabbing; }

/* Music panel */
#music-panel {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg, rgba(8,0,20,0.92), rgba(15,0,35,0.95));
  border:1px solid rgba(255,60,172,0.3);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-radius:20px;
  padding:14px 18px; display:flex; align-items:center; gap:12px;
  z-index:20;
  box-shadow: 0 0 40px rgba(255,60,172,0.15), 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  min-width:260px; max-width:calc(100vw - 32px);
}

/* Equalizer bars decoration */
#music-eq {
  display:flex; align-items:flex-end; gap:2px; height:20px; flex-shrink:0;
}
.eq-bar {
  width:3px; border-radius:2px;
  background:linear-gradient(to top, #ff3cac, #784ba0);
  animation: eqBounce var(--s) ease-in-out infinite alternate;
  transform-origin:bottom;
}
@keyframes eqBounce { 0%{height:4px} 100%{height:var(--h)} }
#music-eq.paused .eq-bar { animation-play-state:paused; height:4px !important; }

.music-info {
  display:flex; flex-direction:column; gap:2px; flex:1; min-width:0;
}
.music-track-label {
  color:rgba(255,140,200,0.5); font-size:9px; letter-spacing:0.25em;
  text-transform:uppercase; font-family:'Raleway',sans-serif;
}
#music-filename {
  color:rgba(255,210,240,0.9); font-size:12px;
  font-family:'Raleway',sans-serif; letter-spacing:0.02em; font-weight:600;
  max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

/* Volume row */
.music-vol-row {
  display:flex; align-items:center; gap:6px; margin-top:4px;
}
.vol-icon { color:rgba(255,100,180,0.5); font-size:10px; }
#music-vol {
  -webkit-appearance:none; flex:1; height:3px; border-radius:2px;
  background:linear-gradient(to right, rgba(255,60,172,0.6) calc(var(--val,80)*1%), rgba(255,255,255,0.1) calc(var(--val,80)*1%));
  outline:none; cursor:pointer;
}
#music-vol::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px; border-radius:50%;
  background:linear-gradient(135deg,#ff3cac,#c1007e);
  cursor:pointer; box-shadow:0 0 8px rgba(255,60,172,0.8);
}
#music-vol::-moz-range-thumb {
  width:12px; height:12px; border-radius:50%; border:none;
  background:linear-gradient(135deg,#ff3cac,#c1007e);
}

.music-controls {
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}

#btn-playpause {
  width:42px; height:42px; border-radius:50%;
  background:linear-gradient(135deg,#ff3cac,#784ba0);
  color:#fff; border:none; cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 20px rgba(255,60,172,0.6), 0 4px 12px rgba(0,0,0,0.4);
  transition:transform 0.15s,box-shadow 0.15s;
  flex-shrink:0; position:relative;
}
#btn-playpause:hover, #btn-playpause:active { transform:scale(1.1); box-shadow:0 0 35px rgba(255,60,172,0.9); }
#btn-playpause.playing { background:linear-gradient(135deg,#784ba0,#2b86c5); }
/* Pulse ring when playing */
#btn-playpause.playing::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  border:1.5px solid rgba(255,60,172,0.4);
  animation:ringPulse 1.8s ease-in-out infinite;
}
@keyframes ringPulse { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.18);opacity:0} }

label.music-file-label {
  display:flex; align-items:center; justify-content:center;
  width:32px; height:32px; border-radius:50%;
  background:rgba(255,60,172,0.12); border:1px solid rgba(255,60,172,0.25);
  color:rgba(255,160,210,0.8); font-size:14px;
  cursor:pointer; transition:all 0.2s; flex-shrink:0;
}
label.music-file-label:hover { background:rgba(255,60,172,0.25); border-color:rgba(255,60,172,0.6); }
label.music-file-label input { display:none; }

#hint {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  color:rgba(255,180,220,0.55); font-size:0.72rem; letter-spacing:0.2em;
  text-align:center; pointer-events:none; animation:hintPulse 3s ease-in-out infinite;
  white-space:nowrap;
}
@keyframes hintPulse { 0%,100%{opacity:0.55} 50%{opacity:0.9} }

/* ======== MODAL ======== */
#frase-modal {
  position:fixed; inset:0; z-index:100;
  display:none; align-items:center; justify-content:center;
  padding:16px;
}
#frase-modal.open { display:flex; }
.modal-backdrop {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  animation:backdropIn 0.35s ease;
}
@keyframes backdropIn { from{opacity:0} to{opacity:1} }

.modal-card {
  position:relative; z-index:2;
  background: linear-gradient(160deg, rgba(28,0,48,0.98) 0%, rgba(12,0,28,0.99) 50%, rgba(20,0,38,0.98) 100%);
  border:1px solid rgba(255,60,172,0.22);
  border-radius:24px; padding:44px 36px 36px;
  max-width:520px; width:100%; text-align:center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 0 50px rgba(255,60,172,0.22),
    0 0 100px rgba(120,75,160,0.12),
    0 24px 60px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation:modalIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  overflow:hidden;
}
@keyframes modalIn { from{opacity:0;transform:scale(0.78) translateY(24px)} to{opacity:1;transform:scale(1) translateY(0)} }

/* Top glow accent */
.modal-card::before {
  content:''; position:absolute; top:0; left:20%; right:20%; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,60,172,0.7), rgba(180,100,255,0.7), transparent);
}
/* Bottom subtle glow */
.modal-card::after {
  content:''; position:absolute; bottom:-30px; left:50%; transform:translateX(-50%);
  width:200px; height:60px; border-radius:50%;
  background:rgba(255,60,172,0.08); filter:blur(20px); pointer-events:none;
}

.modal-deco-top {
  display:block; font-size:3.2rem; margin-bottom:1rem;
  animation:floatDeco 3s ease-in-out infinite;
  filter:drop-shadow(0 0 16px rgba(255,100,200,0.5));
}
@keyframes floatDeco { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-8px) scale(1.05)} }

/* Category tag */
.modal-tag {
  display:inline-block; padding:3px 12px; border-radius:20px; margin-bottom:16px;
  background:linear-gradient(135deg, rgba(255,60,172,0.15), rgba(120,75,160,0.15));
  border:1px solid rgba(255,60,172,0.2);
  color:rgba(255,140,200,0.7); font-size:9px; letter-spacing:0.3em;
  font-family:'Raleway',sans-serif; text-transform:uppercase;
}

.modal-frase {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.15rem,3.2vw,1.75rem);
  font-style:italic; font-weight:600;
  color:#fff;
  line-height:1.7; letter-spacing:0.01em;
  text-shadow:0 2px 20px rgba(255,100,200,0.25);
  margin-bottom:24px;
  position:relative;
}
/* Quote marks */
.modal-frase::before {
  content:'\201C'; position:absolute; top:-10px; left:-4px;
  font-size:3.5rem; color:rgba(255,60,172,0.15); font-family:'Cormorant Garamond',serif;
  line-height:1; pointer-events:none;
}

.modal-divider {
  display:flex; align-items:center; gap:10px; margin-bottom:16px;
}
.modal-divider-line {
  flex:1; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,60,172,0.3), transparent);
}
.modal-divider-dot {
  width:4px; height:4px; border-radius:50%;
  background:rgba(255,60,172,0.6);
  box-shadow:0 0 6px rgba(255,60,172,0.8);
}

.modal-firma {
  color:rgba(255,150,200,0.45); font-size:0.72rem;
  letter-spacing:0.35em; font-family:'Raleway',sans-serif;
}
.modal-close {
  position:absolute; top:16px; right:16px;
  width:32px; height:32px; border-radius:50%;
  background:rgba(255,60,172,0.08); border:1px solid rgba(255,60,172,0.18);
  color:rgba(255,100,200,0.5); font-size:13px; cursor:pointer;
  transition:all 0.2s; display:flex; align-items:center; justify-content:center;
  line-height:1;
}
.modal-close:hover { color:#fff; background:rgba(255,60,172,0.25); border-color:rgba(255,60,172,0.5); transform:rotate(90deg); }

.modal-stars {
  position:absolute; inset:0; overflow:hidden; border-radius:24px; pointer-events:none;
}
.modal-star {
  position:absolute; width:2px; height:2px; border-radius:50%;
  background:#fff; animation:starTwinkle var(--dur) ease-in-out infinite;
  opacity:var(--op);
}
@keyframes starTwinkle { 0%,100%{opacity:var(--op)} 50%{opacity:calc(var(--op)*0.15)} }

/* Mobile modal */
@media (max-width:480px) {
  .modal-card { padding:36px 24px 28px; border-radius:20px; }
  .modal-frase { font-size:clamp(1.05rem, 4.2vw, 1.4rem); }
  .modal-deco-top { font-size:2.6rem; }
}

/* ======== CURSOR CLICK HINT ======== */
.click-hint {
  position:absolute; bottom:90px; right:20px;
  color:rgba(255,180,220,0.4); font-size:0.65rem; letter-spacing:0.2em;
  text-align:right; pointer-events:none; animation:hintPulse 4s ease-in-out infinite;
}

/* ======== MOBILE RESPONSIVE ======== */
@media (max-width:600px) {
  /* Screen 1 */
  .pregunta { font-size:clamp(1.8rem, 11vw, 3rem) !important; }
  .corazon-deco { font-size:clamp(2rem, 8vw, 3rem); }
  .btn-si { padding:0.85rem 2.2rem; font-size:1.1rem; }
  .btn-no { padding:0.75rem 1.6rem; font-size:0.95rem; }
  .btns-row { gap:1rem; }

  /* Screen 2 */
  .sabia-texto { font-size:clamp(1.4rem, 7vw, 2.2rem); }
  .btn-regalo { padding:1rem 2.5rem; font-size:1.1rem; }

  /* Screen 3 hints */
  #hint { font-size:0.62rem; letter-spacing:0.12em; top:12px; padding:0 8px; }
  .click-hint { display:none; }

  /* Music panel mobile */
  #music-panel {
    bottom:12px; padding:10px 14px; gap:10px; min-width:unset;
    border-radius:16px;
  }
  #music-filename { max-width:100px; font-size:11px; }
  #btn-playpause { width:38px; height:38px; font-size:13px; }
  #music-eq { height:16px; }
}

@media (max-width:400px) {
  .pregunta { font-size:clamp(1.6rem, 12vw, 2.4rem) !important; }
  #music-filename { max-width:80px; font-size:10px; }
  .music-track-label { display:none; }
}
</style>
</head>
<body>

<!-- SCREEN 1 -->
<div id="screen1">
  <div class="stars-bg"></div>
  <div style="position:relative;z-index:2;text-align:center;padding:2rem;">
    <span class="corazon-deco">💗</span>
    <div class="pregunta">¿ERES MIGAJERA?</div>
    <p class="subtitulo">sé honesta...</p>
    <div class="btns-row">
      <button class="btn-si" onclick="dijoSi()">Sí 💝</button>
      <button class="btn-no" id="btnNo" onclick="moverNo(this)">No 🙄</button>
    </div>
  </div>
</div>

<!-- SCREEN 2 -->
<div id="screen2">
  <div class="stars-bg"></div>
  <div style="position:relative;z-index:2;text-align:center;padding:2rem;">
    <span class="sabia-emoji">😏✨</span>
    <div class="sabia-texto">Sabía que<br>dirías que sí...</div>
    <button class="btn-regalo" onclick="abrirRegalo()">🎁 Tienes un regalo</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="screen3">
  <canvas id="universe-canvas"></canvas>
  <div id="hint">✨ Arrastra para explorar · Pellizca para acercar · Toca las frases</div>
  <div class="click-hint">TOCA UNA FRASE ✦</div>

  <!-- MUSIC PANEL -->
  <div id="music-panel">
    <!-- Equalizer bars -->
    <div id="music-eq" class="paused">
      <div class="eq-bar" style="--s:0.6s;--h:18px"></div>
      <div class="eq-bar" style="--s:0.8s;--h:14px;animation-delay:0.1s"></div>
      <div class="eq-bar" style="--s:0.5s;--h:20px;animation-delay:0.2s"></div>
      <div class="eq-bar" style="--s:0.9s;--h:12px;animation-delay:0.05s"></div>
      <div class="eq-bar" style="--s:0.7s;--h:16px;animation-delay:0.15s"></div>
    </div>
    <!-- Info -->
    <div class="music-info">
      <span class="music-track-label">♫ reproduciendo</span>
      <span id="music-filename">ninguna canción...</span>
      <div class="music-vol-row">
        <span class="vol-icon">🔈</span>
        <input type="range" id="music-vol" min="0" max="1" step="0.05" value="0.8" oninput="cambiarVolumen(this.value)">
      </div>
    </div>
    <!-- Controls -->
    <div class="music-controls">
      <label class="music-file-label" title="Cargar canción">
        🎵
        <input type="file" id="music-file-input" accept="audio/*" onchange="cargarMusica(this)">
      </label>
      <button id="btn-playpause" onclick="toggleMusica()">▶</button>
    </div>
  </div>
</div>

<!-- MODAL FRASE -->
<div id="frase-modal" onclick="cerrarModal(event)">
  <div class="modal-backdrop"></div>
  <div class="modal-card" id="modal-card">
    <div class="modal-stars" id="modal-stars"></div>
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <span class="modal-deco-top" id="modal-emoji">💫</span>
    <div class="modal-tag">para ti ✦</div>
    <div class="modal-frase" id="modal-texto">frase aquí</div>
    <div class="modal-divider">
      <div class="modal-divider-line"></div>
      <div class="modal-divider-dot"></div>
      <div class="modal-divider-line"></div>
    </div>
    <div class="modal-firma">—  con cariño ✦</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

/* ======== SCREEN 1 ======== */
let noClicks = 0;

function moverNo(btn) {
  noClicks++;
  const reduction = Math.pow(0.85, noClicks - 1);
  const fontSize = 1.1 * reduction;
  const padding = 0.9 * reduction;
  const opacity = Math.max(0, 1 - (noClicks * 0.15));
  
  btn.style.fontSize  = fontSize + 'rem';
  btn.style.padding   = padding + 'rem ' + (padding * 2.44) + 'rem';
  btn.style.opacity   = opacity;
  btn.style.position = 'fixed';
  btn.style.transition = 'all 0.25s ease';
  const bw = btn.offsetWidth  || 100;
  const bh = btn.offsetHeight || 44;
  const maxX = window.innerWidth  - bw - 20;
  const maxY = window.innerHeight - bh - 20;
  btn.style.left = (20 + Math.random() * maxX) + 'px';
  btn.style.top  = (20 + Math.random() * maxY) + 'px';
  btn.style.zIndex = 999;
  if (opacity <= 0) {
    btn.style.pointerEvents = 'none';
  }
}

function dijoSi() {
  const s1 = document.getElementById('screen1');

function abrirRegalo() {
  document.getElementById('screen2').style.display='none';
  document.getElementById('screen3').style.display='block';
  initUniverse();
  
  // Cargar y reproducir automáticamente slow dancing in the dark.mp3
  if (!audioEl) {
    audioEl = new Audio('Radiohead_-_Let_Down_Remastered_(mp3.pm).mp3');
    audioEl.loop = true;
    audioEl.volume = parseFloat(document.getElementById('music-vol').value);
    audioEl.play().then(() => {
      isPlaying = true;
      document.getElementById('music-filename').textContent = 'Radiohead • Let Down Remastered';

      isPlaying = false;

  }
}

/* ======== MUSIC ======== */
let audioEl = null;
let isPlaying = false;

function cargarMusica(input) {
  const file = input.files[0];
  if (!file) return;
  const name = file.name.replace(/\.[^.]+$/, '');
  document.getElementById('music-filename').textContent = name.length > 24 ? name.slice(0,22)+'…' : name;

  if (audioEl) { audioEl.pause(); audioEl = null; }
  audioEl = new Audio(URL.createObjectURL(file));
  audioEl.loop = true;
  audioEl.volume = parseFloat(document.getElementById('music-vol').value);
  audioEl.play().then(() => {
    isPlaying = true;
    document.getElementById('btn-playpause').textContent = '⏸';
    document.getElementById('btn-playpause').classList.add('playing');
    document.getElementById('music-eq').classList.remove('paused');
  }).catch(() => {
    isPlaying = false;
    document.getElementById('music-filename').textContent = '❌ No se pudo reproducir';
    document.getElementById('btn-playpause').textContent = '▶';
    document.getElementById('btn-playpause').classList.remove('playing');
    document.getElementById('music-eq').classList.add('paused');
  });
}

function toggleMusica() {
  if (!audioEl) {
    document.getElementById('music-filename').textContent = '⚠ Elige una canción primero';
    return;
  }
  if (isPlaying) {
    audioEl.pause();
    isPlaying = false;
    document.getElementById('btn-playpause').textContent = '▶';
    document.getElementById('btn-playpause').classList.remove('playing');
    document.getElementById('music-eq').classList.add('paused');
  } else {
    audioEl.play().then(() => {
      isPlaying = true;
      document.getElementById('btn-playpause').textContent = '⏸';
      document.getElementById('btn-playpause').classList.add('playing');
      document.getElementById('music-eq').classList.remove('paused');
    }).catch(() => {
      document.getElementById('music-filename').textContent = '❌ No se pudo reproducir';
    });
  }
}

function cambiarVolumen(v) {
  if (audioEl) audioEl.volume = parseFloat(v);
  const pct = Math.round(parseFloat(v) * 100);
  document.getElementById('music-vol').style.setProperty('--val', pct);
}

function abrirModal(index) {
  const data = frasesModal[index];
  document.getElementById('modal-emoji').textContent = data.emoji;
  document.getElementById('modal-texto').textContent = data.texto;

  // Generate modal stars
  const container = document.getElementById('modal-stars');
  container.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'modal-star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;
      --dur:${1.5+Math.random()*2.5}s;--op:${0.15+Math.random()*0.4};
      width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
    container.appendChild(s);
  }

  const modal = document.getElementById('frase-modal');
  modal.classList.add('open');
}

function cerrarModal(e) {
  if (!e || e.target === document.getElementById('frase-modal') || e.target === document.querySelector('.modal-backdrop') || !e.target) {
    document.getElementById('frase-modal').classList.remove('open');
  }
}

/* ======== UNIVERSE ======== */
function initUniverse() {
  const canvas = document.getElementById('universe-canvas');
  const W = window.innerWidth, H = window.innerHeight;

  const isMobile = window.innerWidth <= 600;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
  renderer.setClearColor(0x000000);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 2000);
  camera.position.set(0, 8, 58);

  // -- GALAXY CORE: pure point clouds — no solid meshes that create dark blobs --
  function makeCoreCloud(count, radius, r, g, b, opacity, ptSize) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count*3), col = new Float32Array(count*3);
    for (let i = 0; i < count; i++) {
      const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
      const rad=Math.pow(Math.random(),0.4)*radius;
      pos[i*3]=rad*Math.sin(ph)*Math.cos(th);
      pos[i*3+1]=rad*Math.sin(ph)*Math.sin(th);
      pos[i*3+2]=rad*Math.cos(ph);
      const bri=0.6+Math.random()*0.4;
      col[i*3]=r*bri; col[i*3+1]=g*bri; col[i*3+2]=b*bri;
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    return new THREE.Points(geo,new THREE.PointsMaterial({size:ptSize,vertexColors:true,transparent:true,opacity,sizeAttenuation:true,depthWrite:false}));
  }
  // White-hot inner core
  scene.add(makeCoreCloud(2200,1.2, 1,0.9,1, 0.9, 0.17));
  // Bright hot-pink core
  scene.add(makeCoreCloud(4000,3.0, 1,0.22,0.78, 0.72, 0.14));
  // Soft magenta halo
  scene.add(makeCoreCloud(5000,5.8, 1,0.08,0.65, 0.52, 0.12));
  // Wide diffuse outer glow
  scene.add(makeCoreCloud(3500,9.0, 0.85,0.05,0.58, 0.32, 0.1));

  // -- NEBULA CLOUDS (point-based, no solid meshes) --
  const nebDefs = [
    {x:12,y:3,z:-8,  r:1,g:0.15,b:0.72, cnt:1200, rad:5},
    {x:-14,y:-2,z:10, r:0.5,g:0.1,b:0.9, cnt:1000, rad:4},
    {x:6,y:5,z:12,   r:0.8,g:0.2,b:1,   cnt:900,  rad:4.5},
    {x:-8,y:4,z:-12,  r:0.2,g:0.5,b:1,   cnt:800,  rad:3.5},
    {x:18,y:-3,z:4,  r:1,g:0.35,b:0.8,  cnt:700,  rad:3},
  ];
  nebDefs.forEach(n => {
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(n.cnt*3),col=new Float32Array(n.cnt*3);
    for(let i=0;i<n.cnt;i++){
      const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),rad=Math.pow(Math.random(),0.6)*n.rad;
      pos[i*3]=n.x+rad*Math.sin(ph)*Math.cos(th);
      pos[i*3+1]=n.y+rad*Math.sin(ph)*Math.sin(th);
      pos[i*3+2]=n.z+rad*Math.cos(ph);
      const bri=0.3+Math.random()*0.5;
      col[i*3]=n.r*bri;col[i*3+1]=n.g*bri;col[i*3+2]=n.b*bri;
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:0.13,vertexColors:true,transparent:true,opacity:0.45,sizeAttenuation:true,depthWrite:false})));
  });

  // -- GALAXY SPIRAL (4-arm, pink/purple/blue palette) --
  const GC = 22000;
  const gGeo = new THREE.BufferGeometry();
  const gPos = new Float32Array(GC*3), gCol = new Float32Array(GC*3);
  for (let i = 0; i < GC; i++) {
    const r = Math.pow(Math.random(), 0.5) * 42;
    const arm = (i%4)*(Math.PI*2/4);
    const spin = r*0.28, spread = 0.5;
    const angle = arm + spin + (Math.random()-0.5)*spread*(1+r/18);
    gPos[i*3]   = Math.cos(angle)*r + (Math.random()-0.5)*spread*r*0.35;
    gPos[i*3+1] = (Math.random()-0.5)*1.6*(1-r/42*0.55);
    gPos[i*3+2] = Math.sin(angle)*r + (Math.random()-0.5)*spread*r*0.35;
    const t = r/42;
    if (t < 0.1) {
      // core: white-pink
      gCol[i*3]=1; gCol[i*3+1]=0.8; gCol[i*3+2]=0.9;
    } else if (t < 0.35) {
      // inner arms: bright pink
      gCol[i*3]=1; gCol[i*3+1]=0.25+t*0.3; gCol[i*3+2]=0.6+t*0.2;
    } else if (t < 0.65) {
      // mid arms: purple-pink
      gCol[i*3]=0.85; gCol[i*3+1]=0.15; gCol[i*3+2]=0.65+t*0.2;
    } else {
      // outer: blue-purple
      gCol[i*3]=0.35+t*0.3; gCol[i*3+1]=0.2+t*0.4; gCol[i*3+2]=0.8+t*0.2;
    }
  }
  gGeo.setAttribute('position', new THREE.BufferAttribute(gPos,3));
  gGeo.setAttribute('color', new THREE.BufferAttribute(gCol,3));
  const gMat = new THREE.PointsMaterial({size:0.11,vertexColors:true,transparent:true,opacity:0.92,sizeAttenuation:true});
  const galaxy = new THREE.Points(gGeo, gMat);
  scene.add(galaxy);

  // -- GALAXY DUST LAYER (extra thickness) --
  const DC = 6000;
  const dGeo = new THREE.BufferGeometry();
  const dPos = new Float32Array(DC*3), dCol = new Float32Array(DC*3);
  for (let i = 0; i < DC; i++) {
    const r = Math.pow(Math.random(),0.7)*38;
    const angle = Math.random()*Math.PI*2;
    dPos[i*3]   = Math.cos(angle)*r + (Math.random()-0.5)*r*0.3;
    dPos[i*3+1] = (Math.random()-0.5)*0.8;
    dPos[i*3+2] = Math.sin(angle)*r + (Math.random()-0.5)*r*0.3;
    dCol[i*3]=0.6+Math.random()*0.4; dCol[i*3+1]=0.1+Math.random()*0.2; dCol[i*3+2]=0.4+Math.random()*0.4;
  }
  dGeo.setAttribute('position', new THREE.BufferAttribute(dPos,3));
  dGeo.setAttribute('color', new THREE.BufferAttribute(dCol,3));
  scene.add(new THREE.Points(dGeo, new THREE.PointsMaterial({size:0.07,vertexColors:true,transparent:true,opacity:0.45})));

  // -- HEART --
  const HC = 8000;
  const hGeo = new THREE.BufferGeometry();
  const hPos = new Float32Array(HC*3), hCol = new Float32Array(HC*3);
  const hT = [];
  for (let i = 0; i < HC; i++) {
    const t = (i/HC)*Math.PI*2;
    const s = 0.62;
    const tx = 16*Math.pow(Math.sin(t),3)*s + (Math.random()-0.5)*0.4;
    const ty = (13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*s + (Math.random()-0.5)*0.4;
    const tz = (Math.random()-0.5)*1.6;
    hT.push(tx, ty, tz);
    hPos[i*3]=(Math.random()-0.5)*70; hPos[i*3+1]=(Math.random()-0.5)*70; hPos[i*3+2]=(Math.random()-0.5)*70;
    // Pure pink/magenta palette — no orange
    const bright = 0.7 + Math.random()*0.3;
    const mix = Math.random();
    hCol[i*3]  = bright;
    hCol[i*3+1]= 0.05 + mix*0.25;
    hCol[i*3+2]= 0.5*bright + mix*0.4;
  }
  hGeo.setAttribute('position', new THREE.BufferAttribute(hPos,3));
  hGeo.setAttribute('color', new THREE.BufferAttribute(hCol,3));
  const hMat = new THREE.PointsMaterial({size:0.22,vertexColors:true,transparent:true,opacity:1,sizeAttenuation:true});
  const heartPts = new THREE.Points(hGeo, hMat);
  heartPts.position.y = 7;
  scene.add(heartPts);

  // -- DEEP BACKGROUND STARS --
  const SC = 7000;
  const sGeo = new THREE.BufferGeometry();
  const sPos = new Float32Array(SC*3), sCols = new Float32Array(SC*3);
  for (let i = 0; i < SC; i++) {
    const r = 100 + Math.random()*180;
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    sPos[i*3]=r*Math.sin(ph)*Math.cos(th);
    sPos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    sPos[i*3+2]=r*Math.cos(ph);
    const c=[[1,1,1],[1,0.9,0.95],[0.8,0.8,1],[1,0.75,0.9],[0.9,0.7,1]][Math.floor(Math.random()*5)];
    sCols[i*3]=c[0]; sCols[i*3+1]=c[1]; sCols[i*3+2]=c[2];
  }
  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos,3));
  sGeo.setAttribute('color', new THREE.BufferAttribute(sCols,3));
  scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({size:0.38,vertexColors:true,transparent:true,opacity:0.8})));

  // -- FLOATING SPARKLES --
  const PKC = 3000;
  const pkGeo = new THREE.BufferGeometry();
  const pkPos = new Float32Array(PKC*3), pkCol = new Float32Array(PKC*3);
  const pkVel = [];
  const pkColors=[[1,0.2,0.8],[0.85,0.1,0.6],[1,0.35,0.75],[0.6,0.15,1],[0.9,0.5,1],[0.3,0.6,1],[1,0.6,0.9]];
  for (let i = 0; i < PKC; i++) {
    pkPos[i*3]=(Math.random()-0.5)*55;
    pkPos[i*3+1]=(Math.random()-0.5)*38;
    pkPos[i*3+2]=(Math.random()-0.5)*20;
    const c=pkColors[Math.floor(Math.random()*pkColors.length)];
    pkCol[i*3]=c[0]; pkCol[i*3+1]=c[1]; pkCol[i*3+2]=c[2];
    pkVel.push((Math.random()-0.5)*0.014, 0.004+Math.random()*0.011, (Math.random()-0.5)*0.007);
  }
  pkGeo.setAttribute('position', new THREE.BufferAttribute(pkPos,3));
  pkGeo.setAttribute('color', new THREE.BufferAttribute(pkCol,3));
  const pkPts = new THREE.Points(pkGeo, new THREE.PointsMaterial({size:0.2,vertexColors:true,transparent:true,opacity:0.85}));
  scene.add(pkPts);

  // -- ORBIT RINGS (pink/purple palette) --
  [[10,0xff3cac,0.22,0.3,0.1],[16,0xc1007e,0.16,0.5,0.3],[23,0x784ba0,0.13,0.8,0.6],[30,0x2b86c5,0.08,1.1,0.9]].forEach(([rad,col,op,rx,rz])=>{
    const rg = new THREE.RingGeometry(rad, rad+0.3, 128);
    const rm = new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide,transparent:true,opacity:op});
    const mesh = new THREE.Mesh(rg, rm);
    mesh.rotation.x = Math.PI/2+rx; mesh.rotation.z = rz;
    scene.add(mesh);
  });

  // -- LABEL SPRITES (clickable) --
  const labelSprites = [];
  const lblColors = ['#ff88cc','#ff55bb','#dd44ff','#88aaff','#ff44aa','#cc77ff','#ffaadd','#55ddff','#ff66bb','#aa55ff'];

  function makeSprite(text, color, index) {
    const lc = document.createElement('canvas');
    lc.width = 560; lc.height = 100;
    const ctx = lc.getContext('2d');
    ctx.clearRect(0,0,560,100);

    // Subtle background pill
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.roundRect(10, 18, 540, 64, 18);
    ctx.fill();

    ctx.font = 'bold 26px Georgia,serif';
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 22;
    ctx.textAlign = 'center';
    ctx.fillText(text, 280, 60);

    // Sparkle dots
    ctx.shadowBlur = 0;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.6;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(40+i*240, 15+Math.random()*70, 2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    const tex = new THREE.CanvasTexture(lc);
    const mat = new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.88,depthWrite:false});
    const sp = new THREE.Sprite(mat);
    sp.scale.set(9,1.8,1);
    sp.userData.phraseIndex = index;
    sp.userData.isLabel = true;
    return sp;
  }

  frasesModal.forEach((f, i) => {
    // Short label for display (first 2-3 words + emoji)
    const words = f.texto.split(' ');
    const shortLabel = words.slice(0,4).join(' ') + '… ' + f.emoji;
    const col = lblColors[i % lblColors.length];
    const sp = makeSprite(shortLabel, col, i);
    const r = 26 + Math.random()*18;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    sp.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta)+4, r*Math.cos(phi));
    sp.userData.r=r; sp.userData.theta=theta; sp.userData.phi=phi;
    sp.userData.speed=0.0002+Math.random()*0.0003;
    sp.userData.phiSpeed=(Math.random()-0.5)*0.0002;
    sp.userData.amp=Math.random()*2.5;
    sp.userData.offset=Math.random()*Math.PI*2;
    scene.add(sp);
    labelSprites.push(sp);
  });

  // -- RAYCASTER for click on labels --
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let mouseDownPos = { x: 0, y: 0 };

  canvas.addEventListener('mousedown', e => {
    mouseDownPos = { x: e.clientX, y: e.clientY };
  });

  canvas.addEventListener('click', e => {
    const dx = Math.abs(e.clientX - mouseDownPos.x);
    const dy = Math.abs(e.clientY - mouseDownPos.y);
    if (dx > 5 || dy > 5) return; // was a drag, not a click

    mouse.x = (e.clientX / window.innerWidth)*2 - 1;
    mouse.y = -(e.clientY / window.innerHeight)*2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(labelSprites);
    if (hits.length > 0 && hits[0].object.userData.isLabel) {
      abrirModal(hits[0].object.userData.phraseIndex);
    } else {
      // Firework on empty click
      spawnFW((Math.random()-0.5)*20, Math.random()*12, (Math.random()-0.5)*6);
    }
  });

  // Touch tap for labels
  let touchStartPos = { x: 0, y: 0 };
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, { passive: false });

  // -- FIREWORKS --
  const fireworks = [];
  function spawnFW(x, y, z) {
    const n = isMobile ? 180 : 380;
    const geo = new THREE.BufferGeometry();
    const p = new Float32Array(n*3), c = new Float32Array(n*3), v = [];
    const hue = [[1,0.2,0.8],[0.9,0.1,0.6],[1,0.6,0.9],[0.5,0.2,1],[0.8,0.4,1],[0.3,0.7,1]][Math.floor(Math.random()*6)];
    for (let i = 0; i < n; i++) {
      const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI, sp=0.05+Math.random()*0.24;
      v.push(Math.sin(ph)*Math.cos(th)*sp, Math.sin(ph)*Math.sin(th)*sp, Math.cos(ph)*sp);
      p[i*3]=x; p[i*3+1]=y; p[i*3+2]=z;
      c[i*3]=hue[0]; c[i*3+1]=hue[1]; c[i*3+2]=hue[2];
    }
    geo.setAttribute('position', new THREE.BufferAttribute(p,3));
    geo.setAttribute('color', new THREE.BufferAttribute(c,3));
    const mat = new THREE.PointsMaterial({size:0.3,vertexColors:true,transparent:true,opacity:1,sizeAttenuation:true});
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);
    fireworks.push({pts, v, life:1});
  }
  setInterval(()=>{ spawnFW((Math.random()-0.5)*24, Math.random()*14-2, (Math.random()-0.5)*10); }, isMobile ? 3500 : 2000);

  // -- ORBIT CONTROLS --
  let isDrag=false, isPan=false;
  let prev = {x:0, y:0};
  let sph = {theta:0.3, phi:1.4, r:58};
  const target = new THREE.Vector3(0, 4, 0);

  function updateCam() {
    const x=sph.r*Math.sin(sph.phi)*Math.sin(sph.theta);
    const y=sph.r*Math.cos(sph.phi);
    const z=sph.r*Math.sin(sph.phi)*Math.cos(sph.theta);
    camera.position.set(x+target.x, y+target.y, z+target.z);
    camera.lookAt(target);
  }
  updateCam();

  let dragStarted = false;
  canvas.addEventListener('mousedown', e => {
    e.button===2 ? isPan=true : isDrag=true;
    prev={x:e.clientX, y:e.clientY};
    dragStarted=false;
    e.preventDefault();
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('mouseup', ()=>{ isDrag=false; isPan=false; });
  window.addEventListener('mousemove', e => {
    const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
    if (isDrag) {
      if (Math.abs(dx)>2||Math.abs(dy)>2) dragStarted=true;
      sph.theta-=dx*0.005;
      sph.phi=Math.max(0.05,Math.min(Math.PI-0.05,sph.phi+dy*0.005));
      updateCam();
    }
    if (isPan) {
      const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
      const right=new THREE.Vector3().crossVectors(dir,camera.up).normalize();
      const up2=new THREE.Vector3().crossVectors(right,dir).normalize();
      target.addScaledVector(right,-dx*0.06); target.addScaledVector(up2,dy*0.06); updateCam();
    }
    prev={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener('wheel',e=>{
    sph.r=Math.max(8,Math.min(140,sph.r+e.deltaY*0.06));
    updateCam(); e.preventDefault();
  },{passive:false});

  // Touch
  let ltd=null, ltt=null, td=false;
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){td=true;ltt={x:e.touches[0].clientX,y:e.touches[0].clientY};}
    if(e.touches.length===2){td=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ltd=Math.sqrt(dx*dx+dy*dy);}
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&td&&ltt){
      const dx=e.touches[0].clientX-ltt.x,dy=e.touches[0].clientY-ltt.y;
      sph.theta-=dx*0.006;sph.phi=Math.max(0.05,Math.min(Math.PI-0.05,sph.phi+dy*0.006));
      updateCam();ltt={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(ltd){sph.r=Math.max(8,Math.min(140,sph.r-(d-ltd)*0.15));updateCam();}ltd=d;
    }
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    // Tap to open label modal
    if(e.changedTouches.length===1&&td){
      const t=e.changedTouches[0];
      const dx=Math.abs(t.clientX-touchStartPos.x),dy=Math.abs(t.clientY-touchStartPos.y);
      if(dx<8&&dy<8){
        mouse.x=(t.clientX/window.innerWidth)*2-1;
        mouse.y=-(t.clientY/window.innerHeight)*2+1;
        raycaster.setFromCamera(mouse,camera);
        const hits=raycaster.intersectObjects(labelSprites);
        if(hits.length>0&&hits[0].object.userData.isLabel){
          abrirModal(hits[0].object.userData.phraseIndex);
        }
      }
    }
    td=false;ltd=null;
  });

  // -- ANIMATE --
  const clock = new THREE.Clock();
  let ht = 0;
  (function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    galaxy.rotation.y = time*0.038;

    // Heart form animation
    ht += 0.016;
    const hp = heartPts.geometry.attributes.position.array;
    const prog = Math.min(ht/5,1);
    const ease = prog<0.5?2*prog*prog:-1+(4-2*prog)*prog;
    for (let i = 0; i < HC; i++) {
      hp[i*3]   += (hT[i*3]   - hp[i*3])   * (0.022+ease*0.04);
      hp[i*3+1] += (hT[i*3+1] - hp[i*3+1]) * (0.022+ease*0.04);
      hp[i*3+2] += (hT[i*3+2] - hp[i*3+2]) * (0.022+ease*0.04);
    }
    heartPts.geometry.attributes.position.needsUpdate = true;
    const pulse = 1 + Math.sin(time*2)*0.04;
    heartPts.scale.set(pulse, pulse, pulse);

    // Sparkles
    const pk = pkPts.geometry.attributes.position.array;
    for (let i = 0; i < PKC; i++) {
      pk[i*3]   += pkVel[i*3];
      pk[i*3+1] += pkVel[i*3+1];
      pk[i*3+2] += pkVel[i*3+2];
      pk[i*3]   += Math.sin(time*0.4+i*0.1)*0.003;
      if (pk[i*3+1] > 20) { pk[i*3+1]=-16; pk[i*3]=(Math.random()-0.5)*55; pk[i*3+2]=(Math.random()-0.5)*20; }
    }
    pkPts.geometry.attributes.position.needsUpdate = true;

    // Labels orbit
    labelSprites.forEach((sp, i) => {
      const ud = sp.userData;
      ud.theta += ud.speed;
      ud.phi   += ud.phiSpeed;
      ud.phi = Math.max(0.1, Math.min(Math.PI-0.1, ud.phi));
      const r = ud.r + Math.sin(time*0.25+ud.offset)*ud.amp;
      sp.position.x = r*Math.sin(ud.phi)*Math.cos(ud.theta);
      sp.position.y = r*Math.sin(ud.phi)*Math.sin(ud.theta)+4;
      sp.position.z = r*Math.cos(ud.phi);
      sp.material.opacity = 0.55 + Math.sin(time*0.9+ud.offset)*0.38;
    });

    // Fireworks
    for (let fi = fireworks.length-1; fi >= 0; fi--) {
      const fw = fireworks[fi]; fw.life -= 0.011;
      fw.pts.material.opacity = fw.life;
      const fp = fw.pts.geometry.attributes.position.array;
      for (let j = 0; j < fp.length/3; j++) {
        fp[j*3]  +=fw.v[j*3]; fp[j*3+1]+=fw.v[j*3+1]-0.003; fp[j*3+2]+=fw.v[j*3+2];
        fw.v[j*3]*=0.977; fw.v[j*3+1]*=0.977; fw.v[j*3+2]*=0.977;
      }
      fw.pts.geometry.attributes.position.needsUpdate = true;
      if (fw.life <= 0) { scene.remove(fw.pts); fw.pts.geometry.dispose(); fw.pts.material.dispose(); fireworks.splice(fi,1); }
    }

    renderer.render(scene, camera);
  })();

  window.addEventListener('resize', ()=>{
    const W2=window.innerWidth, H2=window.innerHeight;
    camera.aspect=W2/H2; camera.updateProjectionMatrix();
    renderer.setSize(W2,H2);
  });
}
</script>
</body>
</html>
